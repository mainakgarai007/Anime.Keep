<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Anime Keep</title><style>*{box-sizing:border-box}body{margin:0;background:#111827;color:#fff;font-family:sans-serif;padding:18px}.top{display:flex;gap:10px;align-items:center}.search{flex:1;padding:16px;border-radius:30px;border:none;background:#1f2937;color:#fff;font-size:16px}.title{font-size:28px;font-weight:700;margin:20px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}.card{border-radius:24px;padding:20px;min-height:220px;box-shadow:0 10px 25px rgba(0,0,0,.3);transition:.3s}.card:hover{transform:translateY(-5px)}.c1{background:#0f766e}.c2{background:#92400e}.c3{background:#52525b}.c4{background:#6d28d9}.c5{background:#166534}.count{opacity:.8;font-size:14px}.fab{position:fixed;right:20px;bottom:20px;width:75px;height:75px;border:none;border-radius:50%;font-size:40px;background:#2563eb;color:white}.hero{background:#1f2937;padding:20px;border-radius:24px;margin-bottom:20px}</style></head><body><div class='hero'><h1>🎌 Anime Keep</h1><p>Track, Search and Discover Anime</p></div><div class='top'><input class='search' placeholder='🔍 Search new anime or add anime'></div><div class='title'>Categories</div><div class='grid'><div class='card c1'><h2>📺 Ongoing Anime</h2><p class='count'>Watching now</p></div><div class='card c2'><h2>⏳ Waiting Update</h2><p class='count'>No season news yet</p></div><div class='card c3'><h2>🚫 Dropped</h2><p class='count'>Not interested</p></div><div class='card c4'><h2>✅ Completed</h2><p class='count'>Finished anime</p></div><div class='card c5'><h2>✨ New Anime & Suggestions</h2><p class='count'>Recommendations</p></div></div><button class='fab'>+</button></body></html>
