<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Anime Keep</title><style>body{background:#121212;color:#fff;font-family:Arial;margin:0;padding:20px}.search{width:100%;padding:14px;border-radius:30px;border:none;background:#2a2a2a;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:20px}.card{padding:18px;border-radius:20px;min-height:180px}.c1{background:#146b84}.c2{background:#7b331d}.c3{background:#5a5248}.c4{background:#5a3b79}.c5{background:#216c3c}.fab{position:fixed;right:20px;bottom:20px;background:#2962ff;color:#fff;border:none;border-radius:50%;width:70px;height:70px;font-size:35px}</style></head><body><input class='search' placeholder='Search or add anime...'><div class='grid'><div class='card c1'><h2>Ongoing Anime</h2></div><div class='card c2'><h2>Waiting / No Update</h2></div><div class='card c3'><h2>Dropped</h2></div><div class='card c4'><h2>Completed</h2></div><div class='card c5'><h2>New Anime & Suggestions</h2></div></div><button class='fab' onclick='addAnime()'>+</button><script>function addAnime(){let a=prompt("Anime name?");if(a)alert(a+" added (demo)")}</script></body></html>
